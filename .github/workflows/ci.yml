name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Lint (non-blocking, tech debt pendiente)
        run: npm run lint
        continue-on-error: true
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  smoke:
    name: Smoke test producción
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Esperar propagación del deploy a Vercel
        run: sleep 90
      - name: Smoke contra tapicascos-next.vercel.app
        run: node scripts/smoke.mjs
        env:
          SMOKE_BASE_URL: https://tapicascos-next.vercel.app
